<!DOCTYPE html>
<html>
<head>
    <title>Tienda de Bicis</title>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            margin: 0;
            font-family: Arial;
        }

        /* Barra */
        nav {
            position: fixed;
            top: 0;
            width: 100%;
            background-color: rgba(0,0,0,0.7);
            padding: 15px;
            text-align: center;
            z-index: 1000;
        }

        nav a {
            color: white;
            margin: 15px;
            text-decoration: none;
            font-weight: bold;
        }

        /* Inicio */
        .inicio {
            height: 100vh;
            background-image: url("img/fondo.jpg");
            background-size: cover;
            background-position: center;

            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
            color: white;
        }

        .inicio h1 {
            font-size: 50px;
            background-color: rgba(0,0,0,0.5);
            padding: 20px;
            border-radius: 10px;
        }

        /* Sección contacto con corte */
        .contacto {
            background-color: #111;
            color: white;
            text-align: center;
            padding: 100px 20px;

            clip-path: polygon(0 20%, 100% 0%, 100% 100%, 0% 100%);
        }

        .contacto h2 {
            font-size: 40px;
        }

        .contacto a {
            display: inline-block;
            margin-top: 20px;
            padding: 12px 25px;
            background-color: #E1306C;
            color: white;
            text-decoration: none;
            border-radius: 5px;
        }

        /* 📱 Celular */
        @media (max-width: 600px) {

            nav a {
                display: block;
                margin: 10px 0;
            }

            .inicio h1 {
                font-size: 30px;
                padding: 15px;
            }

            .contacto h2 {
                font-size: 28px;
            }
        }

    </style>
</head>

<body>

<!-- Barra -->
<nav>
    <a href="#accesorios">Accesorios</a>
    <a href="#repuestos">Repuestos</a>
    <a href="#herramientas">Herramientas</a>
</nav>

<!-- Inicio -->
<div class="inicio">
    <h1>Repuestos, Accesorios y herramientas en un mismo lugar 👇🚲</h1>
</div>

<!-- Contacto -->
<section class="contacto">
    <h2>Consultas</h2>
    <p>Hablame por Instagram 👇</p>
    <a href=https://www.instagram.com/bike.riders_funes?igsh=MWp1OXRxaTM5NDhyeg==">Instagram</a>
</section>

</body>
</html>
