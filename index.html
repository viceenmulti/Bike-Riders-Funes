<!DOCTYPE html>
<html>
<head>
    <title>Bike riders</title>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        html {
    scroll-behavior: smooth;
}
        body {
            margin: 0;
            font-family: Arial;
        }

        /* Barra */
        nav {
            position: fixed;
            top: 0;
            width: 100%;
            background-color: rgba(0,0,0,0.7);
            padding: 15px;
            text-align: center;
            z-index: 1000;
        }

        nav a {
            color: white;
            margin: 15px;
            text-decoration: none;
            font-weight: bold;
        }

        /* Inicio */
        .inicio {
            height: 100vh;
            background-image: url("img/fondo.jpg");
            background-size: cover;
            background-position: center;

            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
            color: white;
        }

        .inicio h1 {
            font-size: 50px;
            background-color: rgba(0,0,0,0.5);
            padding: 20px;
            border-radius: 10px;
        }

        /* Productos */
        .productos {
            text-align: center;
            padding: 80px 20px;
            background-color: #f4f4f4;
        }

        .productos h2 {
            font-size: 40px;
            margin-bottom: 30px;
        }

        .card {
            background: white;
            width: 250px;
            margin: auto;
            padding: 15px;
            border-radius: 10px;
        }

        .card img {
            width: 100%;
            border-radius: 10px;
        }

        .card button {
            margin-top: 10px;
            padding: 10px;
            background-color: green;
            color: white;
            border: none;
            cursor: pointer;
        }

        /* 🔥 Para que el botón dentro del link no se vea raro */
        .card a {
            text-decoration: none;
        }

        /* Contacto con corte */
        .contacto {
            background-color: #111;
            color: white;
            text-align: center;
            padding: 100px 20px;

            clip-path: polygon(0 20%, 100% 0%, 100% 100%, 0% 100%);
        }

        .contacto h2 {
            font-size: 40px;
        }

        .contacto a {
            display: inline-block;
            margin-top: 20px;
            padding: 12px 25px;
            background-color: #E1306C;
            color: white;
            text-decoration: none;
            border-radius: 5px;
        }

        /* 📱 Celular */
        @media (max-width: 600px) {

            nav a {
                display: block;
                margin: 10px 0;
            }

            .inicio h1 {
                font-size: 30px;
                padding: 15px;
            }

            .productos h2 {
                font-size: 28px;
            }

            .contacto h2 {
                font-size: 28px;
            }
        }

    </style>
</head>

<body>

<!-- Barra -->
<nav>
    <a href="#accesorios">Accesorios</a>
    <a href="#repuestos">Repuestos</a>
    <a href="#herramientas">Herramientas</a>
</nav>

<!-- Inicio -->
<div class="inicio">
    <h1>Repuestos, Accesorios y herramientas en un mismo lugar 👇🚲</h1>
</div>

<!-- Accesorios -->
<section id="accesorios" class="productos">
    <h2>Accesorios</h2>

    <div class="card">
        <img src="img/pegs.jpg">
        <h3>Pegs</h3>
        <p> ̶$̶1̶8̶0̶0̶0̶  a  14000</p>

        <a href="pegs.html">
            <button>Más informacion</button>
        </a>
    </div>
</section>
<!-- Herramientas -->
<section id="herramientas" class="productos">
    <h2>Herramientas</h2>

    <div class="card">
        <img src="img/herramienta.jpg">
        <h3>Llave multi uso</h3>
        <p>$8000</p>

        <a href="herramienta.html">
            <button>Más informacion</button>
        </a>
    </div>
</section>
    <!-- Repuestos -->
<section id="repuestos" class="productos">
    <h2>Repuestos</h2>

    <div class="card">
        <img src="img/frenos.jpg">
        <h3>Frenos tipo taquito (par)</h3>
        <p>   ̶$̶3̶0̶0̶0̶  a  $1500  </p>

        <a href="repuesto.html">
            <button>Más informacion</button>
        </a>
    </div>
</section>
<!-- Contacto -->
<section class="contacto">
    <h2>Consultas</h2>
    <p>Hablame por Instagram 👇</p>
    <a href="https://www.instagram.com/bike.riders_funes?igsh=MWp1OXRxaTM5NDhyeg==">Instagram</a>
</section>

</body>
</html>
