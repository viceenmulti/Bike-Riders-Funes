<!DOCTYPE html>
<html>
<head>
    <title>Tienda de Bicis</title>

    <style>
        body {
            margin: 0;
            font-family: Arial;
        }

        /* Barra arriba */
        nav {
            position: fixed; /* queda fija */
            top: 0;
            width: 100%;
            background-color: rgba(0,0,0,0.7);
            padding: 15px;
            text-align: center;
            z-index: 1000;
        }

        nav a {
            color: white;
            margin: 15px;
            text-decoration: none;
            font-weight: bold;
        }

        /* Sección principal */
        .inicio {
            height: 100vh;
            background-image: url("img/fondo.jpg");
            background-size: cover;
            background-position: center;

            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
            color: white;
        }

        .inicio h1 {
            font-size: 50px;
            background-color: rgba(0,0,0,0.5);
            padding: 20px;
            border-radius: 10px;
        }
    </style>
</head>

<body>

<!-- Barra -->
<nav>
    <a href="#accesorios">Accesorios</a>
    <a href="#repuestos">Repuestos</a>
    <a href="#herramientas">Herramientas</a>
</nav>

<!-- Pantalla principal -->
<div class="inicio">
    <h1>Tienda de Bicicletas 🚲</h1>
</div>

</body>
</html>
